name = "helldeck-descent"
main = "src/worker.ts"
compatibility_date = "2026-06-01"

# Beta runs on <name>.<account>.workers.dev (free). Custom domain at launch (task D-801).

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

# One LedgerDO per host device (idFromName(deviceToken)) — the free-night ledger (D-412).
[[durable_objects.bindings]]
name = "LEDGER"
class_name = "LedgerDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO", "LedgerDO"]

[assets]
directory = "../client/dist"
binding = "ASSETS"

[vars]
ENV = "dev"
# Secrets are set via `wrangler secret put <NAME>` (task D-412):
#   UNLOCK_SECRET — HMAC key that signs the device-bound $9.99 unlock token (required in prod)
#   STRIPE_SECRET — sk_test_… now, sk_live_… at launch (owner-gated). Absent => dev-unlock only.
